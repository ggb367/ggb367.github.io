<style>
  /* ----- Viewer card ----- */
  #cv-resume-section .cv-resume-viewer {
    background: var(--global-card-bg-color);

    border-radius: 8px;

  }
  #cv-resume-section .cv-resume-download-btn {
    background: var(--global-theme-color);
    color: #fff;
  }
  #cv-resume-section .cv-resume-download-btn:hover,
  #cv-resume-section .cv-resume-download-btn:focus {
    background: var(--global-accent-color);
    color: #fff;
    transform: translateY(-1px);
  }
  #cv-resume-section .cv-resume-open-btn {
    background: transparent;
    color: var(--global-text-color);
    border-color: var(--global-divider-color);
  }
  #cv-resume-section .cv-resume-open-btn:hover,
  #cv-resume-section .cv-resume-open-btn:focus {

    color: var(--global-theme-color);
    border-color: var(--global-theme-color);
    transform: translateY(-1px);
  }

  /* ----- Toggle panel ----- */
  #cv-resume-section .cv-resume-toggle {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #cv-resume-section .cv-resume-tab {
    text-align: left;
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--global-divider-color);
    background: var(--global-card-bg-color);
    color: var(--global-text-color);
    cursor: pointer;
    transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    font: inherit;
  }
  #cv-resume-section .cv-resume-tab:hover {
    border-color: var(--global-theme-color);
    color: var(--global-theme-color);
  }
  #cv-resume-section .cv-resume-tab:focus {
    outline: none;
    box-shadow: 0 0 0 3px var(--global-accent-soft);
  }
  #cv-resume-section .cv-resume-tab.active {
    background: var(--global-theme-color);
    border-color: var(--global-theme-color);
    color: #fff;
    box-shadow: var(--global-card-shadow);
  }
  #cv-resume-section .cv-resume-tab.active:hover {

  #cv-resume-section .cv-resume-tab-title {

</style>

<script>
  (function () {
    var buttons  = document.querySelectorAll('#cv-resume-section .cv-resume-tab');
    var iframe   = document.getElementById('cv-resume-iframe');
    var download = document.getElementById('cv-resume-download');
    var openBtn  = document.getElementById('cv-resume-open');
    var dlLabel  = document.getElementById('cv-resume-download-label');
    var curLabel = document.getElementById('cv-resume-current-label');

    function selectDoc(doc) {
      var match = null;
      buttons.forEach(function (b) {
        var isMatch = b.getAttribute('data-doc') === doc;
        b.classList.toggle('active', isMatch);
        b.setAttribute('aria-pressed', isMatch ? 'true' : 'false');
        if (isMatch) match = b;
      });
      if (!match) return;
      var pdf = match.getAttribute('data-pdf');
      var label = match.getAttribute('data-label');
      iframe.src = pdf;
      download.href = pdf;
      openBtn.href = pdf;
      dlLabel.textContent = label;
      curLabel.textContent = label;
      if (window.location.hash.replace('#', '') !== doc) {
        history.replaceState(null, '', '#' + doc);
      }
    }

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        selectDoc(btn.getAttribute('data-doc'));
      });
    });

    var initial = window.location.hash.replace('#', '');
    if (initial === 'cv' || initial === 'resume') {
      selectDoc(initial);
    }
  })();
</script>
