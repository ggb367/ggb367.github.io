{% assign label = include.label | default: "Resume" %}
<div class="resume-embed">
    <iframe src="{{ include.pdf_path }}" title="{{ label }} PDF" style="width: 100%; height: 80vh; border: none;"></iframe>
    <div class="download-link" style="text-align: center; margin-top: 20px;">
        <p>If you can't view the {{ label | downcase }}, download it here:</p>
        <a href="{{ include.pdf_path }}" target="_blank" download style="
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        ">Download {{ label }} (PDF)</a>
    </div>
</div>
